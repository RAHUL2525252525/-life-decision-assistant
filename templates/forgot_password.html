<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Keyphrase | Life Decision Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --gold:#d4af37;
  --gold-bright:#fcf6ba;
  --bg-dark:#050505;
  --glass-deep:rgba(10,10,10,0.85);
  --border:rgba(212,175,55,0.2);
  --accent-glow:rgba(212,175,55,0.1);
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  background:var(--bg-dark);
  color:#fff;
  font-family:'Montserrat',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.card{
  max-width:450px;
  width:100%;
  background:var(--glass-deep);
  backdrop-filter:blur(20px);
  border-radius:24px;
  padding:40px;
  border:1px solid var(--border);
  box-shadow:0 0 80px rgba(0,0,0,0.8),0 0 30px var(--accent-glow);
}

h2{
  font-family:'Cinzel',serif;
  font-size:2rem;
  text-align:center;
  background:linear-gradient(to right,#fff,var(--gold-bright),#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:4px;
  margin-bottom:15px;
  text-transform:uppercase;
}

.flash-messages{ margin-bottom:20px; }
.flash{ margin-bottom:10px; padding:10px; border-radius:8px; font-size:13px; }
.flash.error{ background:rgba(255,70,70,0.2); color:#ff9c9c; }
.flash.success{ background:rgba(212,175,55,0.2); color:#fcf6ba; }

form .input-group{
  position:relative;
  margin-bottom:15px;
}

form input{
  width:100%;
  padding:14px 40px 14px 14px;
  border-radius:12px;
  border:1px solid var(--gold);
  background:rgba(255,255,255,0.03);
  color:#fff;
  font-size:14px;
  outline:none;
}

form input:focus{
  border-color:var(--gold-bright);
  box-shadow:0 0 8px var(--gold-bright);
}

form .eye-icon{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:var(--gold-bright);
}

form button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));
  font-weight:700;
  letter-spacing:2px;
  cursor:pointer;
  color:#000;
  transition:all 0.3s ease;
}

form button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px var(--gold-bright);
}

p{ text-align:center; margin-top:15px; font-size:13px; }
p a{ color:var(--gold); text-decoration:none; }
p a:hover{ text-decoration:underline; }
</style>
</head>
<body>

<div class="card">
  <h2>Reset Keyphrase</h2>

  <div class="flash-messages">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <form method="POST" action="/forgot-password">
    <div class="input-group">
      <input type="email" name="email" placeholder="Enter your Identity (Email)" required>
    </div>

    <div class="input-group">
      <input type="password" name="new_password" placeholder="Enter New Keyphrase" id="new_password" required>
      <i class="fa-solid fa-eye eye-icon" onclick="togglePassword('new_password')"></i>
    </div>

    <div class="input-group">
      <input type="password" name="confirm_password" placeholder="Confirm New Keyphrase" id="confirm_password" required>
      <i class="fa-solid fa-eye eye-icon" onclick="togglePassword('confirm_password')"></i>
    </div>

    <button type="submit">Reset Keyphrase</button>
  </form>

  <p><a href="/login">Back to Login</a></p>
</div>

<script>
function togglePassword(id){
  const input = document.getElementById(id);
  const icon = input.nextElementSibling;
  if(input.type === "password"){
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else{
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
}
</script>

</body>
</html>
